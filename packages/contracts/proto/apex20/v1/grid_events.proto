syntax = "proto3";

package apex20.v1;

option go_package = "github.com/apex20/monorepo/packages/contracts/gen/go/apex20/v1;apex20v1";

// Vec2 representa uma coordenada ou vetor bidimensional.
message Vec2 {
  float x = 1;
  float y = 2;
}

// TokenDelta representa as alterações em um objeto do grid.
// Campos não preenchidos indicam que não houve alteração (Delta strategy).
message TokenDelta {
  string token_id = 1;
  optional Vec2 position = 2;
  optional float rotation = 3;
  optional Vec2 scale = 4;
  optional bool is_visible = 5;
}

// GridEvent encapsula diferentes tipos de interações no tabuleiro.
message GridEvent {
  string campaign_id = 1;
  string user_id = 2;
  
  oneof event {
    TokenDelta token_move = 3;
    string token_delete = 4;
    bool fog_of_war_update = 5;
  }
}

// GridState representa o estado completo de uma cena para sincronização inicial.
message GridState {
  string scene_id = 1;
  repeated TokenDelta tokens = 2;
}

// GridService gerencia a sincronização de alta frequência do mapa.
service GridService {
  // StreamGridEvents permite o envio e recebimento bidirecional de eventos de grid.
  rpc StreamGridEvents(stream GridEvent) returns (stream GridEvent);
}
