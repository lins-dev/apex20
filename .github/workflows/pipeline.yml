name: Apex20 Pipeline 🚀

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Code Quality & Tests 🛡️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js (v24 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          
      - name: Setup Go (1.26)
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Go Lint (Backend)
        run: |
          cd apps/backend && golangci-lint run ./...

      - name: Go Lint (WS-Service)
        run: |
          cd apps/ws-service && golangci-lint run ./...

      - name: Lint & Type-check (TS/JS/Buf)
        run: pnpm turbo lint --filter=!@apex20/backend --filter=!@apex20/ws-service

      - name: Unit Tests
        run: pnpm turbo test

  deploy:
    name: Build & Push Docker Images 🐳
    needs: quality
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, ws-service]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker Tags
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "TAGS=ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest,ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "TAGS=ghcr.io/${{ github.repository }}/${{ matrix.service }}:dev,ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Check if Dockerfile exists
        id: check_files
        run: |
          if [ -f ./apps/${{ matrix.service }}/Dockerfile ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push
        if: steps.check_files.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
